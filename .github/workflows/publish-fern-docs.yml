# Publishes the Fern site for docs/v* tags or a manual workflow dispatch.
# Required configuration: organization secret DOCS_FERN_TOKEN.

name: Publish Fern Docs

on:
  push:
    tags:
      - "docs/v*"
  workflow_dispatch:

permissions: {}

concurrency:
  group: fern-docs-website
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Fern site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install pinned Fern CLI
        run: | # zizmor: ignore[adhoc-packages] Fern is exact-version pinned in fern.config.json.
          FERN_VERSION="$(jq -r '.version' docs/fern/fern.config.json)"
          if ! [[ "$FERN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Refusing to install unexpected Fern CLI version: $FERN_VERSION"
            exit 1
          fi
          npm install -g "fern-api@${FERN_VERSION}"

      - name: Publish docs
        env:
          FERN_TOKEN: ${{ secrets.DOCS_FERN_TOKEN }}
        working-directory: ./docs/fern
        run: fern generate --docs

      - name: Verify custom-domain publication
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location --max-time 20 \
              --output /dev/null https://docs.nvidia.com/nemo/switchyard/home; then
              exit 0
            fi
            echo "Custom domain is not ready (attempt ${attempt}/12); retrying in 10 seconds."
            sleep 10
          done
          echo "::error::Fern published, but the custom domain did not become ready."
          exit 1

      - name: Generate legacy GitHub Pages redirects
        run: python docs/fern/generate_legacy_redirect_site.py --output legacy-docs-site

      - name: Upload legacy redirects
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: legacy-docs-site
          path: legacy-docs-site/
          include-hidden-files: true
          retention-days: 1

  redirects:
    name: Deploy legacy redirects
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      # This job receives the generated artifact, but never the Fern token.
      actions: read # Required to download redirects generated by the publish job.
      contents: write # Required only to replace the gh-pages branch.
    steps:
      - name: Download legacy redirects
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: legacy-docs-site
          path: legacy-docs-site

      - name: Deploy legacy redirects to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./legacy-docs-site
          keep_files: false
          full_commit_message: "docs: redirect GitHub Pages to Fern"
