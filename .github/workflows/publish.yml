name: Build and publish release distributions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      devzone_stage_artifactory:
        description: "Stage .dev wheels to Artifactory only; no Kitmaker or PyPI publish."
        required: true
        type: boolean
        default: false
      devzone_version:
        description: "PEP 440 .dev version for Artifactory-only staged wheels."
        required: true
        type: string
        default: "0.0.1.dev0"

env:
  DEVZONE_PACKAGE_NAME: "nemo-switchyard"
  MATURIN_VERSION: "1.11.5"

permissions:
  contents: read

jobs:
  python-release-checks:
    name: Release Python checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --locked
      - name: Run lint checks
        run: uv run ruff check .
      - name: Run tests
        run: uv run pytest tests/ -v -x -m "not integration"

  rust-release-checks:
    name: Release Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  source-dist:
    name: Source distribution
    needs: [python-release-checks, rust-release-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --locked
      - name: Build sdist
        run: uv run maturin sdist --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: switchyard-sdist
          path: dist/*

  wheels:
    name: Wheel (${{ matrix.label }})
    needs: [python-release-checks, rust-release-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            manylinux_arch: x86_64
            smoke: true
          - label: linux-aarch64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            manylinux_arch: aarch64
            smoke: false
          - label: macos-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            smoke: true
          - label: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            smoke: true
          - label: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            smoke: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp Devzone package metadata
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.devzone_stage_artifactory }}
        shell: bash
        run: |
          python scripts/release/set_devzone_prerelease_version.py \
            "${{ inputs.devzone_version }}" \
            --package-name "${DEVZONE_PACKAGE_NAME}"
      - name: Setup QEMU for Linux cross builds
        if: matrix.label == 'linux-aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Install maturin
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin==${MATURIN_VERSION}"
      - name: Install Rust target
        if: runner.os != 'Linux'
        shell: bash
        run: rustup target add "${{ matrix.rust_target }}"
      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -e MATURIN_VERSION="${MATURIN_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            "quay.io/pypa/manylinux2014_${{ matrix.manylinux_arch }}" \
            /bin/bash -lc '
              set -euxo pipefail
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              source "${HOME}/.cargo/env"
              PYTHON=/opt/python/cp312-cp312/bin/python
              "${PYTHON}" -m pip install --upgrade pip
              "${PYTHON}" -m pip install "maturin==${MATURIN_VERSION}"
              "${PYTHON}" -m maturin build \
                --release \
                --locked \
                --compatibility pypi \
                --out dist \
                --interpreter "${PYTHON}"
            '
      - name: Build native wheel
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --out dist \
            --target "${{ matrix.rust_target }}"
      - name: Smoke install native wheel on Python 3.12
        if: matrix.smoke
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
      - uses: actions/setup-python@v5
        if: matrix.smoke
        with:
          python-version: "3.14"
      - name: Smoke install native wheel on Python 3.14
        if: matrix.smoke
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: switchyard-wheel-${{ matrix.label }}
          path: dist/*

  stage-devzone-artifactory:
    name: Stage Devzone wheels to Artifactory
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.devzone_stage_artifactory }}
    needs: [wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: switchyard-wheel-*
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify wheel metadata
        env:
          EXPECTED_NAME: ${{ env.DEVZONE_PACKAGE_NAME }}
          EXPECTED_VERSION_INPUT: ${{ inputs.devzone_version }}
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_VERSION="$(python scripts/release/set_devzone_prerelease_version.py \
            "${EXPECTED_VERSION_INPUT}" \
            --print-version)"
          EXPECTED_PREFIX="${EXPECTED_NAME//-/_}"
          export EXPECTED_NAME EXPECTED_PREFIX EXPECTED_VERSION

          python - <<'PY'
          import email
          import glob
          import os
          import zipfile

          expected_name = os.environ["EXPECTED_NAME"]
          expected_prefix = os.environ["EXPECTED_PREFIX"]
          expected_version = os.environ["EXPECTED_VERSION"]
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("no wheels downloaded")

          for path in wheels:
              filename = os.path.basename(path)
              if not filename.startswith(f"{expected_prefix}-{expected_version}-"):
                  raise SystemExit(
                      f"{filename}: expected prefix {expected_prefix}-{expected_version}-"
                  )
              with zipfile.ZipFile(path) as wheel:
                  metadata_name = next(
                      name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")
                  )
                  metadata = email.message_from_bytes(wheel.read(metadata_name))
              if metadata["Name"] != expected_name:
                  raise SystemExit(f"{filename}: Name={metadata['Name']!r}")
              if metadata["Version"] != expected_version:
                  raise SystemExit(f"{filename}: Version={metadata['Version']!r}")
              print(f"{filename}: {metadata['Name']} {metadata['Version']}")
          PY
      - name: Upload wheels to Artifactory
        env:
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
          ARTIFACTORY_URL: ${{ secrets.ARTIFACTORY_URL }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          PACKAGE_NAME: ${{ env.DEVZONE_PACKAGE_NAME }}
          VERSION_INPUT: ${{ inputs.devzone_version }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${ARTIFACTORY_URL}" ]; then
            echo "::error::ARTIFACTORY_URL is required"
            exit 1
          fi
          if [ -z "${ARTIFACTORY_USER}" ] || [ -z "${ARTIFACTORY_TOKEN}" ]; then
            echo "::error::ARTIFACTORY_USER and ARTIFACTORY_TOKEN are required"
            exit 1
          fi

          VERSION="$(python scripts/release/set_devzone_prerelease_version.py \
            "${VERSION_INPUT}" \
            --print-version)"
          BASE_URL="${ARTIFACTORY_URL%/}/${PACKAGE_NAME}/dev/${VERSION}/${GITHUB_RUN_ID}-${GITHUB_SHA:0:12}"
          mkdir -p release

          export BASE_URL
          python - <<'PY' > release/wheel-urls.json
          import glob
          import json
          import os

          base_url = os.environ["BASE_URL"]
          urls = [f"{base_url}/{os.path.basename(path)}" for path in sorted(glob.glob("dist/*.whl"))]
          print(json.dumps({"wheel_urls": urls}, indent=2))
          PY

          echo "## Artifactory Wheel Staging" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "| Wheel | URL |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|---|---|" >> "${GITHUB_STEP_SUMMARY}"

          for wheel in dist/*.whl; do
            filename="$(basename "${wheel}")"
            target_url="${BASE_URL}/${filename}"
            body_file="$(mktemp)"
            http_code="$(curl -sSL -o "${body_file}" -w "%{http_code}" \
              --connect-timeout 30 --max-time 300 \
              --retry 3 --retry-delay 5 --retry-all-errors \
              -u "${ARTIFACTORY_USER}:${ARTIFACTORY_TOKEN}" \
              -T "${wheel}" \
              "${target_url}")"
            if [ "${http_code}" != "201" ]; then
              echo "::error::Artifactory deploy failed: HTTP ${http_code} at ${target_url}"
              cat "${body_file}" || true
              exit 1
            fi
            rm -f "${body_file}"
            echo "| \`${filename}\` | ${target_url} |" >> "${GITHUB_STEP_SUMMARY}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: devzone-wheel-urls
          path: release/wheel-urls.json

  list-distributions:
    name: List distributions
    needs: [source-dist, wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: switchyard-*
          merge-multiple: true
      - name: List distributions
        run: ls -l dist

  publish:
    name: Publish distributions
    # Public PyPI/GitHub publishing is intentionally disabled until the OSS release gate is ready.
    if: ${{ false }}
    needs: [source-dist, wheels]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: switchyard-*
          merge-multiple: true
      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
