name: Build and publish release distributions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_dev_artifact:
        description: "Build one Linux x86_64 dev wheel artifact."
        required: true
        type: boolean
        default: false
      publish_dev_to_pypi:
        description: "Publish the dev wheel artifact to PyPI with Trusted Publishing."
        required: true
        type: boolean
        default: false
      build_dev_matrix:
        description: "Build the complete dev sdist and wheel matrix."
        required: true
        type: boolean
        default: false
      publish_dev_matrix_to_pypi:
        description: "Publish the complete dev matrix to PyPI with Trusted Publishing."
        required: true
        type: boolean
        default: false
      dev_version:
        description: "PEP 440 .dev version for the dev wheel."
        required: true
        type: string
        default: "0.0.1.dev0"

env:
  DEV_PACKAGE_NAME: "nemo-switchyard"
  MATURIN_VERSION: "1.11.5"
  PYPI_CHECK_URL: "https://pypi.org/simple/nemo-switchyard/"

permissions:
  contents: read

jobs:
  # OSS-style split:
  # - Root v* tags run the complete release validation and wheel matrix.
  # - Manual dev builds create exactly one Linux x86_64 artifact, with an explicit opt-in
  #   to publish that dev wheel to PyPI for prerelease testing.
  # - Manual dev matrix builds reuse the complete release matrix with stamped .dev metadata.
  #
  # This deliberately avoids NVIDIA-internal release services from GitHub-hosted
  # runners. The runner could not resolve artifactory.nvidia.com or
  # kitmaker-portal.nvidia.com during probes, this repo does not currently have
  # Dynamo-style NVIDIA self-hosted release runners, and GitHub Packages is not a
  # PyPI-compatible package index. Until that changes, dev wheels either stay as
  # one-day GitHub Actions artifacts or publish directly to PyPI through Trusted Publishing.
  python-release-checks:
    name: Release Python checks (${{ matrix.python-version }})
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --locked
      - name: Run lint checks
        run: uv run ruff check .
      - name: Run tests
        run: uv run pytest tests/ -v -x -m "not integration"

  rust-release-checks:
    name: Release Rust checks
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust components
        run: rustup component add rustfmt clippy
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace -- --test-threads=1

  source-dist:
    name: Source distribution
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix) }}
    needs: [python-release-checks, rust-release-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --locked
      - name: Stamp dev source distribution metadata
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix }}
        run: |
          python scripts/release/set_dev_wheel_version.py \
            "${{ inputs.dev_version }}" \
            --package-name "${DEV_PACKAGE_NAME}"
      - name: Build sdist
        run: uv run maturin sdist --out dist
      - name: Verify sdist license files
        run: |
          python - <<'PY'
          from pathlib import Path
          import tarfile

          archives = list(Path("dist").glob("*.tar.gz"))
          if len(archives) != 1:
              raise SystemExit(f"expected one sdist archive, found {archives}")

          with tarfile.open(archives[0]) as archive:
              archive_paths = set(archive.getnames())

          expected_suffixes = {"LICENSE", "NOTICE"}
          present_suffixes = {Path(path).name for path in archive_paths}
          missing = sorted(expected_suffixes - present_suffixes)
          if missing:
              raise SystemExit(f"{archives[0]} is missing required license files: {missing}")

          print(f"{archives[0]} contains {', '.join(sorted(expected_suffixes))}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: nemo-switchyard-sdist
          path: dist/*

  wheels:
    name: Wheel (${{ matrix.label }})
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix) }}
    needs: [python-release-checks, rust-release-checks]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            manylinux_arch: x86_64
            smoke: true
          - label: linux-aarch64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            manylinux_arch: aarch64
            smoke: false
          - label: macos-x86_64
            os: macos-15-intel
            rust_target: x86_64-apple-darwin
            smoke: true
          - label: macos-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            smoke: true
          - label: windows-x86_64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            smoke: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp dev wheel metadata
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix }}
        shell: bash
        run: |
          python scripts/release/set_dev_wheel_version.py \
            "${{ inputs.dev_version }}" \
            --package-name "${DEV_PACKAGE_NAME}"
      - name: Setup QEMU for Linux cross builds
        if: matrix.label == 'linux-aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Install maturin
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin==${MATURIN_VERSION}"
      - name: Install Rust target
        if: runner.os != 'Linux'
        shell: bash
        run: rustup target add "${{ matrix.rust_target }}"
      - name: Build manylinux wheel
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -e MATURIN_VERSION="${MATURIN_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            "quay.io/pypa/manylinux2014_${{ matrix.manylinux_arch }}" \
            /bin/bash -lc '
              set -euxo pipefail
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              source "${HOME}/.cargo/env"
              PYTHON=/opt/python/cp312-cp312/bin/python
              "${PYTHON}" -m pip install --upgrade pip
              "${PYTHON}" -m pip install "maturin==${MATURIN_VERSION}"
              "${PYTHON}" -m maturin build \
                --release \
                --locked \
                --compatibility pypi \
                --out dist \
                --interpreter "${PYTHON}"
            '
      - name: Build native wheel
        if: runner.os != 'Linux'
        shell: bash
        run: |
          python -m maturin build \
            --release \
            --locked \
            --compatibility pypi \
            --out dist \
            --target "${{ matrix.rust_target }}"
      - name: Smoke install native wheel on Python 3.12
        if: ${{ matrix.smoke }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
      - uses: actions/setup-python@v5
        if: ${{ matrix.smoke }}
        with:
          python-version: "3.14"
      - name: Smoke install native wheel on Python 3.14
        if: ${{ matrix.smoke }}
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import os
          import sys
          import tempfile

          os.chdir(tempfile.mkdtemp(prefix="switchyard-wheel-smoke-"))
          workspace = os.environ.get("GITHUB_WORKSPACE")
          sys.path = [entry for entry in sys.path if entry not in ("", workspace)]

          import switchyard
          import switchyard_rust
          from switchyard_rust import _switchyard_rust

          print("switchyard", switchyard.__version__)
          print("switchyard_rust", switchyard_rust.__file__)
          print("rust extension", _switchyard_rust.__name__)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: nemo-switchyard-wheel-${{ matrix.label }}
          path: dist/*

  dev-artifact-wheel:
    name: Dev wheel artifact (linux-x86_64)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_artifact }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Stamp dev wheel metadata
        shell: bash
        run: |
          python scripts/release/set_dev_wheel_version.py \
            "${{ inputs.dev_version }}" \
            --package-name "${DEV_PACKAGE_NAME}"
      - name: Build manylinux x86_64 wheel
        shell: bash
        run: |
          set -euxo pipefail
          docker run --rm \
            -e MATURIN_VERSION="${MATURIN_VERSION}" \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            "quay.io/pypa/manylinux2014_x86_64" \
            /bin/bash -lc '
              set -euxo pipefail
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
              source "${HOME}/.cargo/env"
              PYTHON=/opt/python/cp312-cp312/bin/python
              "${PYTHON}" -m pip install --upgrade pip
              "${PYTHON}" -m pip install "maturin==${MATURIN_VERSION}"
              "${PYTHON}" -m maturin build \
                --release \
                --locked \
                --compatibility pypi \
                --out dist \
                --interpreter "${PYTHON}"
            '
      - uses: actions/upload-artifact@v4
        with:
          name: dev-wheel-linux-x86_64
          path: dist/*.whl
          retention-days: 1

  verify-dev-artifact:
    name: Verify dev wheel artifact
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_artifact }}
    needs: [dev-artifact-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dev-wheel-*
          merge-multiple: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify wheel metadata
        env:
          EXPECTED_NAME: ${{ env.DEV_PACKAGE_NAME }}
          EXPECTED_VERSION_INPUT: ${{ inputs.dev_version }}
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_VERSION="$(python scripts/release/set_dev_wheel_version.py \
            "${EXPECTED_VERSION_INPUT}" \
            --print-version)"
          EXPECTED_PREFIX="${EXPECTED_NAME//-/_}"
          export EXPECTED_NAME EXPECTED_PREFIX EXPECTED_VERSION

          python - <<'PY'
          import email
          import glob
          import os
          import zipfile

          expected_name = os.environ["EXPECTED_NAME"]
          expected_prefix = os.environ["EXPECTED_PREFIX"]
          expected_version = os.environ["EXPECTED_VERSION"]
          wheels = sorted(glob.glob("dist/*.whl"))
          if not wheels:
              raise SystemExit("no wheels downloaded")

          for path in wheels:
              filename = os.path.basename(path)
              if not filename.startswith(f"{expected_prefix}-{expected_version}-"):
                  raise SystemExit(
                      f"{filename}: expected prefix {expected_prefix}-{expected_version}-"
                  )
              with zipfile.ZipFile(path) as wheel:
                  metadata_name = next(
                      name for name in wheel.namelist() if name.endswith(".dist-info/METADATA")
                  )
                  metadata = email.message_from_bytes(wheel.read(metadata_name))
              if metadata["Name"] != expected_name:
                  raise SystemExit(f"{filename}: Name={metadata['Name']!r}")
              if metadata["Version"] != expected_version:
                  raise SystemExit(f"{filename}: Version={metadata['Version']!r}")
              print(f"{filename}: {metadata['Name']} {metadata['Version']}")
          PY

  publish-dev-artifact:
    name: Publish dev wheel to PyPI
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_artifact && inputs.publish_dev_to_pypi }}
    needs: [verify-dev-artifact]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dev-wheel-*
          merge-multiple: true
      - uses: astral-sh/setup-uv@v6
      - name: List distributions
        run: ls -l dist
      - name: Publish dev wheel to PyPI
        run: uv publish --trusted-publishing always dist/*.whl

  list-distributions:
    name: List distributions
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix) }}
    needs: [source-dist, wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nemo-switchyard-*
          merge-multiple: true
      - name: List distributions
        run: ls -l dist

  publish-dev-matrix:
    name: Publish dev matrix to PyPI
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_dev_matrix && inputs.publish_dev_matrix_to_pypi }}
    needs: [source-dist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nemo-switchyard-*
          merge-multiple: true
      - uses: astral-sh/setup-uv@v6
      - name: List distributions
        run: ls -l dist
      - name: Publish dev matrix to PyPI
        run: uv publish --trusted-publishing always --check-url "${PYPI_CHECK_URL}" dist/*

  publish:
    name: Publish distributions
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: [source-dist, wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: nemo-switchyard-*
          merge-multiple: true
      - uses: astral-sh/setup-uv@v6
      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
